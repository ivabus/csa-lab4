name: Integration Tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  run-forgery-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build forgery compiler/emulator
        run: cargo build --release

      - name: Make Python generators executable
        run: chmod +x tests/*.py

      - name: Run all Golden tests
        run: |
          for test_file in tests/*.toml; do
            echo "======================================================="
            echo "Executing test: $test_file"
            ./target/release/forgery test "$test_file"
            echo ""
          done
